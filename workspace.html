<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LEARNEX — Workspace Portal</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #03040a; --acc: #00F2FE; }
    body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; }
  </style>
</head>
<body>
  <div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Workspace Portal</h1>
    <div id="video-container"></div>
  </div>

  <script>
    // Direct API Integration
    async function loadAsset(assetId) {
      try {
        const response = await fetch(`https://ntxapi.wasmer.app/v1/stream/${assetId}`);
        const data = await response.json();
        
        // Redirect to player with token
        if(data.token) {
          window.location.href = `player.html?token=${encodeURIComponent(data.token)}`;
        }
      } catch (err) {
        console.error("API Error:", err);
      }
    }
  </script>
</body>
</html>
