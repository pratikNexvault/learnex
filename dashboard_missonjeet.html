
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RolexCoderZ — Select Batch</title>
<script src="https://rolexcoderz.com/Check/guard.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#03040a;
  --s1:#080b14;
  --s2:#0d1120;
  --b1:rgba(255,255,255,0.05);
  --b2:rgba(255,255,255,0.09);
  --b3:rgba(255,255,255,0.16);
  --tx:#f4f1ff;
  --tx2:rgba(244,241,255,0.55);
  --tx3:rgba(244,241,255,0.28);
  --a1:#5b4bdb;
  --a2:#8b5cf6;
  --a3:#c4b5fd;
  --go:#f59e0b;
  --gn:#10b981;
  --glow1:rgba(91,75,219,0.22);
  --glow2:rgba(139,92,246,0.14);
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--tx);
  font-family:'Manrope',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── ATMOSPHERE ── */
.atm{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.atm-spot{position:absolute;border-radius:50%;filter:blur(100px)}
.sp1{
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(91,75,219,.16) 0%,transparent 65%);
  top:-200px;left:-200px;
  animation:fl1 22s ease-in-out infinite;
}
.sp2{
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(139,92,246,.1) 0%,transparent 65%);
  bottom:-150px;right:-150px;
  animation:fl2 28s ease-in-out infinite;
}
.sp3{
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(245,158,11,.07) 0%,transparent 65%);
  top:45%;left:55%;
  animation:fl3 18s ease-in-out infinite;
}
@keyframes fl1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.08)}}
@keyframes fl2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,60px) scale(1.06)}}
@keyframes fl3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-46%,-53%) scale(1.12)}}

.atm-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 85% 85% at 50% 50%,black 20%,transparent 100%);
}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:62px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;
  background:rgba(3,4,10,.7);
  backdrop-filter:blur(28px) saturate(160%);
  border-bottom:1px solid var(--b1);
}
.nav-logo{
  display:flex;align-items:center;gap:12px;
  text-decoration:none;
}
.nl-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:800;color:#fff;
  letter-spacing:-.01em;
  box-shadow:0 0 18px rgba(91,75,219,.5),0 4px 12px rgba(0,0,0,.4);
  position:relative;
  overflow:hidden;
}
.nl-mark::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 50%);
}
.nl-text{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:1.05rem;font-weight:800;letter-spacing:-.02em;
  color:var(--tx);
}
.nl-text span{
  background:linear-gradient(120deg,var(--a2),var(--a3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-tag{
  font-size:.62rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--tx3);
  border:1px solid var(--b2);
  padding:5px 12px;border-radius:100px;
  background:rgba(255,255,255,.02);
}

/* ── MAIN ── */
main{
  position:relative;z-index:5;
  min-height:100vh;
  padding:108px 24px 80px;
  display:flex;flex-direction:column;align-items:center;
}

/* ── HERO HEADER ── */
.hdr{
  text-align:center;
  margin-bottom:64px;
  animation:riseIn .9s cubic-bezier(.16,1,.3,1) both;
}
.hdr-kicker{
  display:inline-flex;align-items:center;gap:10px;
  margin-bottom:20px;
}
.kicker-bar{width:28px;height:2px;background:linear-gradient(90deg,transparent,var(--a2));border-radius:2px}
.kicker-bar.r{background:linear-gradient(90deg,var(--a2),transparent)}
.kicker-text{
  font-size:.62rem;font-weight:700;letter-spacing:.28em;text-transform:uppercase;
  color:var(--tx3);
}
.hdr-h1{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:clamp(3rem,8vw,5.8rem);
  font-weight:900;
  line-height:.96;
  letter-spacing:-.04em;
  color:var(--tx);
  margin-bottom:6px;
}
.hdr-h1 .ital{
  font-family:'Instrument Serif',serif;
  font-style:italic;
  font-weight:400;
  background:linear-gradient(110deg,var(--a3) 0%,var(--a2) 40%,var(--go) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200%;
  animation:bgShift 5s ease infinite;
}
@keyframes bgShift{0%,100%{background-position:0%}50%{background-position:100%}}
.hdr-sub{
  font-size:.85rem;font-weight:400;
  color:var(--tx3);margin-top:18px;
  letter-spacing:.02em;
}
.hdr-count{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:20px;
  font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--tx2);
  background:rgba(255,255,255,.03);
  border:1px solid var(--b2);
  padding:7px 16px;border-radius:100px;
}
.count-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);box-shadow:0 0 8px rgba(16,185,129,.7)}

/* ── GRID ── */
.grid{
  width:100%;max-width:1120px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  gap:18px;
}

/* ── CARD ── */
.card{
  position:relative;
  display:flex;flex-direction:column;
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:18px;
  overflow:hidden;
  text-decoration:none;color:inherit;
  transition:transform .4s cubic-bezier(.16,1,.3,1),border-color .3s,box-shadow .4s;
  animation:cardRise .6s cubic-bezier(.16,1,.3,1) both;
  cursor:pointer;
}
.card:nth-child(1){animation-delay:.04s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.16s}
.card:nth-child(4){animation-delay:.22s}
.card:nth-child(5){animation-delay:.28s}
.card:nth-child(6){animation-delay:.34s}
.card:nth-child(7){animation-delay:.4s}
.card:nth-child(8){animation-delay:.46s}
@keyframes cardRise{
  from{opacity:0;transform:translateY(32px)}
  to{opacity:1;transform:translateY(0)}
}
.card:hover{
  transform:translateY(-8px);
  border-color:rgba(91,75,219,.35);
  box-shadow:0 28px 60px rgba(0,0,0,.55),0 0 0 1px rgba(91,75,219,.2),inset 0 1px 0 rgba(255,255,255,.04);
}

/* card shine on hover */
.card-shine{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 50% -10%,rgba(91,75,219,.14) 0%,transparent 55%);
  opacity:0;transition:opacity .4s;
}
.card:hover .card-shine{opacity:1}

/* top accent line */
.card-line{
  position:absolute;top:0;left:10%;right:10%;height:1px;z-index:10;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,.7),rgba(196,181,253,.7),transparent);
  transform:scaleX(0);transform-origin:center;
  transition:transform .45s cubic-bezier(.16,1,.3,1);
}
.card:hover .card-line{transform:scaleX(1)}

/* image */
.card-img{
  position:relative;
  aspect-ratio:16/9;overflow:hidden;
  background:linear-gradient(135deg,#0a0c1e,#111328);
  flex-shrink:0;
}
.card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .65s cubic-bezier(.16,1,.3,1),filter .4s;
  filter:brightness(.75) saturate(1.15);
}
.card:hover .card-img img{transform:scale(1.07);filter:brightness(.88) saturate(1.3)}
.card-img-fg{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(180deg,transparent 30%,rgba(8,11,20,.95) 100%);
}
.card-img-ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;opacity:.1;user-select:none;
}
.card-num{
  position:absolute;bottom:10px;right:14px;z-index:3;
  font-family:'Space Mono',monospace;
  font-size:2.4rem;font-weight:700;
  color:rgba(255,255,255,.07);line-height:1;user-select:none;
}

/* body */
.card-body{
  padding:16px 18px 18px;
  display:flex;flex-direction:column;gap:0;
  flex:1;position:relative;z-index:2;
}
.card-tag{
  display:inline-flex;align-items:center;gap:5px;
  align-self:flex-start;
  font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--a3);
  background:rgba(91,75,219,.12);
  border:1px solid rgba(91,75,219,.22);
  padding:3px 10px;border-radius:100px;
  margin-bottom:8px;
}
.td{width:4px;height:4px;border-radius:50%;background:var(--a3);opacity:.8}
.card-name{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:1.18rem;font-weight:700;
  line-height:1.22;letter-spacing:-.025em;
  color:var(--tx);margin-bottom:auto;
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:14px;margin-top:14px;
  border-top:1px solid var(--b1);
}
.cf-label{
  font-size:.7rem;font-weight:600;letter-spacing:.06em;
  color:var(--tx3);transition:color .2s;
}
.card:hover .cf-label{color:var(--a3)}
.cf-btn{
  width:30px;height:30px;border-radius:50%;
  background:var(--s2);
  border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;color:var(--tx3);
  transition:all .35s cubic-bezier(.16,1,.3,1);
}
.card:hover .cf-btn{
  background:linear-gradient(135deg,var(--a1),var(--a2));
  border-color:transparent;color:#fff;
  transform:rotate(-40deg);
  box-shadow:0 4px 16px rgba(91,75,219,.45);
}

/* ── EMPTY STATE ── */
.empty{
  grid-column:1/-1;
  text-align:center;padding:100px 20px;
}
.empty-icon{font-size:3rem;opacity:.12;margin-bottom:14px}
.empty-text{font-size:.82rem;color:var(--tx3);letter-spacing:.04em}

/* ── ANIMATIONS ── */
@keyframes riseIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  nav{padding:0 20px;height:56px}
  main{padding:88px 14px 60px}
  .grid{grid-template-columns:1fr;gap:12px}
  .hdr-h1{font-size:2.8rem}
  .hdr{margin-bottom:40px}
}
</style>
</head>
