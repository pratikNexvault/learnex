<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Access · LearnEx</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080a10;--s1:#0f1220;--b1:rgba(255,255,255,.05);
  --tx:#eef2ff;--tx2:rgba(238,242,255,.58);--tx3:rgba(238,242,255,.28);
  --gn:#4ade80;--rd:#f43f5e;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--tx);
  font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}
.atm{position:fixed;inset:0;pointer-events:none}
.sp{position:absolute;border-radius:50%;filter:blur(90px)}
.sp1{width:500px;height:500px;top:-150px;left:-150px;animation:fa 22s ease-in-out infinite}
.sp1.ok{background:radial-gradient(circle,rgba(16,185,129,.12),transparent 65%)}
.sp1.err{background:radial-gradient(circle,rgba(244,63,94,.1),transparent 65%)}
@keyframes fa{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
.grid-bg{
  position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
}
.card{
  position:relative;z-index:10;
  background:var(--s1);border:1px solid var(--b1);border-radius:24px;
  padding:40px 36px;max-width:400px;width:calc(100% - 32px);
  text-align:center;
  animation:rise .45s cubic-bezier(.16,1,.3,1) both;
}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;}
.card.ok::before{background:linear-gradient(90deg,transparent,rgba(16,185,129,.6),transparent)}
.card.err::before{background:linear-gradient(90deg,transparent,rgba(244,63,94,.5),transparent)}
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.ico{width:68px;height:68px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:2rem;}
.ico.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.ico.err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2)}
h1{font-size:1.35rem;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
.sub{font-size:.82rem;color:var(--tx2);line-height:1.65;margin-bottom:20px}
.timer-bar-wrap{background:rgba(255,255,255,.04);border-radius:100px;height:4px;margin:20px 0 10px;overflow:hidden;}
.timer-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gn),rgba(16,185,129,.5));width:100%;transition:width .1s linear;}
.timer-txt{font-size:.66rem;color:var(--tx3);font-weight:600;letter-spacing:.06em}
.retry-btn{
  margin-top:18px;display:inline-flex;align-items:center;gap:8px;
  padding:12px 22px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.22);
  border-radius:10px;color:var(--rd);font-size:.78rem;font-weight:700;
  text-decoration:none;transition:.2s;font-family:inherit;cursor:pointer;
}
.retry-btn:hover{background:rgba(244,63,94,.18)}
</style>
</head>
<body>

<div class="atm"><div class="sp sp1 err" id="spEl"></div></div>
<div class="grid-bg"></div>

<!-- Default: Access Denied (shown if JS fails) -->
<div class="card err" id="mainCard">
  <div class="ico err" id="icoEl">🚫</div>
  <h1 id="titleEl">Access Denied</h1>
  <p class="sub" id="subEl">
    You must arrive here through the <strong>official short link</strong>.<br>
    Direct access is not allowed.
  </p>
  <a class="retry-btn" href="https://arolinks.com/Learnex" id="retryBtn">← Go Back &amp; Try Again</a>
  <!-- Success state timer -->
  <div class="timer-bar-wrap" id="timerWrap" style="display:none">
    <div class="timer-bar" id="timerBar"></div>
  </div>
  <div class="timer-txt" id="timerTxt" style="display:none">Redirecting…</div>
</div>

<script>
(function(){
  try{
    var params = new URLSearchParams(window.location.search);

    /* ── Helper: save rcz_token (what guard.js reads) ── */
    function grantAccess(){
      localStorage.setItem('rcz_token', JSON.stringify({
        exp: Date.now() + 86400000,
        grantedAt: Date.now()
      }));
    }

    /* ── Helper: check existing token ── */
    function hasValidToken(){
      try{
        var raw = localStorage.getItem('rcz_token');
        if(!raw) return false;
        var d = JSON.parse(raw);
        return d && typeof d.exp === 'number' && Date.now() < d.exp;
      }catch(e){ return false; }
    }

    /* ── Show success UI and redirect ── */
    function showSuccess(){
      var card = document.getElementById('mainCard');
      var sp   = document.getElementById('spEl');
      card.classList.remove('err'); card.classList.add('ok');
      sp.classList.remove('err');   sp.classList.add('ok');
      document.getElementById('icoEl').textContent   = '✅';
      document.getElementById('titleEl').textContent = 'Access Granted!';
      document.getElementById('subEl').innerHTML     = '24 ghante ke liye access unlock ho gaya.<br>Redirect ho raha hai…';
      document.getElementById('retryBtn').style.display = 'none';
      document.getElementById('timerWrap').style.display = 'block';
      document.getElementById('timerTxt').style.display  = 'block';

      /* shrink bar over 1.4s */
      var bar = document.getElementById('timerBar');
      bar.style.width = '100%';
      setTimeout(function(){ bar.style.transition='width 1.3s linear'; bar.style.width='0%'; }, 50);

      setTimeout(function(){ location.replace('/NT'); }, 1400);
    }

    /* ── CASE 1: Coming back from arolinks (bypass=1) ── */
    if(params.get('bypass') === '1'){
      var flowNonce = sessionStorage.getItem('rcz_flow_nonce');
      var flowTime = parseInt(sessionStorage.getItem('rcz_flow_time') || '0');
      
      if(flowNonce && (Date.now() - flowTime) < 300000){
        // Valid flow — clean markers, grant access
        sessionStorage.removeItem('rcz_flow_nonce');
        sessionStorage.removeItem('rcz_flow_time');
        grantAccess();
        showSuccess();
      }
      // else: stay on "Access Denied" (default HTML)
      return;
    }

    /* ── CASE 2: Already has valid token ── */
    if(hasValidToken()){
      showSuccess();
      return;
    }

    /* ── CASE 3: Direct access, no token — show denied (default UI already shown) ── */

  }catch(e){}
})();

/* ── Flow marker: save before redirect to arolinks ── */
document.addEventListener('DOMContentLoaded',function(){
  var btn=document.getElementById('retryBtn');
  if(btn){
    btn.addEventListener('click',function(){
      sessionStorage.setItem('rcz_flow_nonce',Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2));
      sessionStorage.setItem('rcz_flow_time',Date.now().toString());
    });
  }
});
</script>

</body>
</html>
