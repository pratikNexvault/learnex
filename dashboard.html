<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEARNEX — Choose Your Learning Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:       #0A0E17;
  --bg2:      #111726;
  --bg3:      #161F33;
  --bg4:      #1C2842;
  --acc:      #00F2FE;
  --acc2:     #4FACFE;
  --acc3:     #00D4AA;
  --blue:     #0072FF;
  --teal:     #00F2FE;
  --pink:     #FF3D7F;
  --cream:    #FFFFFF;
  --muted:    rgba(255,255,255,.5);
  --faint:    rgba(255,255,255,.18);
  --gA:       rgba(0,242,254,.15);
  --gB:       rgba(0,242,254,.05);
  --gC:       rgba(0,114,255,.1);
  --border:   rgba(0,242,254,.15);
  --border2:  rgba(0,242,254,.35);
  --radius:   16px;
  --radius-sm:10px;
  --shadow:   0 24px 64px rgba(0,0,0,.8), 0 4px 16px rgba(0,0,0,.5);
  --glow:     0 0 40px rgba(0,242,254,.2), 0 0 80px rgba(0,242,254,.05);
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--cream);
  font-family:'Syne',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════
   BACKGROUNDS & ATMOSPHERE
═══════════════════════════════════ */
.bg-mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 10% 10%, rgba(0,242,254,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 90% 80%, rgba(0,114,255,.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,212,170,.02) 0%, transparent 60%);
}

.bg-noise{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  opacity:.25;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:256px;
}

.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,242,254,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,242,254,.02) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 80%);
}

.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px)}
.orb-1{width:600px;height:600px;top:-200px;left:-150px;background:rgba(0,242,254,.04);animation:orbFloat1 20s ease-in-out infinite}
.orb-2{width:500px;height:500px;bottom:-200px;right:-100px;background:rgba(0,114,255,.04);animation:orbFloat2 25s ease-in-out infinite}

@keyframes orbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px)}}

.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.p{
  position:absolute;bottom:-6px;
  width:var(--s,3px);height:var(--s,3px);
  border-radius:50%;background:var(--c,var(--acc));
  opacity:0;
  animation:particleRise var(--d,9s) ease-in var(--dl,0s) infinite;
  left:var(--l,50%);
  box-shadow:0 0 var(--gs,6px) var(--c,var(--acc));
}
@keyframes particleRise{
  0%{opacity:0;transform:translateY(0) translateX(0) scale(.5)}
  8%{opacity:.6}
  85%{opacity:.2}
  100%{opacity:0;transform:translateY(-100vh) translateX(var(--dx,30px)) scale(.2)}
}

/* ═══════════════════════════════════
   NAV
═══════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:68px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(16px,4vw,40px);
  background:rgba(10,14,23,.8);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border-bottom:1px solid rgba(0,242,254,.12);
}

nav::after{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--acc) 50%,transparent 100%);
}

.nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-box{
  width:40px;height:40px;
  background:linear-gradient(135deg,#002B3D,var(--acc));
  border:1px solid rgba(0,242,254,.4);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;color:#fff;letter-spacing:.05em;
  box-shadow:0 0 24px rgba(0,242,254,.25);
}
.nav-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:.08em;color:var(--cream);
}
.nav-title em{color:var(--acc);font-style:normal;text-shadow:0 0 20px rgba(0,242,254,.4)}

/* ═══════════════════════════════════
   MAIN / HERO
═══════════════════════════════════ */
main{
  position:relative;z-index:10;
  padding:calc(68px + 60px) clamp(16px,5vw,48px) 100px;
  max-width:1300px;margin:0 auto;
}

.hero{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  margin-bottom:64px;
  animation:fadeUp .9s cubic-bezier(.16,1,.3,1) both;
}

.hero-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 18px;
  background:rgba(0,242,254,.06);
  border:1px solid rgba(0,242,254,.2);
  border-radius:100px;
  font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  color:var(--acc2);
  margin-bottom:24px;
}
.pill-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--acc);
  box-shadow:0 0 8px var(--acc);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

.hero-h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3.5rem,9vw,7.5rem);
  line-height:.9;
  letter-spacing:.03em;
  color:var(--cream);
  margin-bottom:20px;
}
.hero-h1 .line-a{display:block;opacity:.9;}
.hero-h1 .line-b{
  display:block;
  background:linear-gradient(110deg,var(--acc) 0%,var(--acc2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(0,242,254,.25));
}

.hero-sub{
  font-size:1rem;font-weight:500;
  color:var(--muted);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:36px;
}
.hero-sub strong{color:var(--acc2)}

.hero-stats{
  display:flex;align-items:center;gap:24px;
  flex-wrap:wrap;justify-content:center;
}
.stat-item{
  display:flex;align-items:center;gap:8px;
  font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);
}
.stat-val{color:var(--cream);font-size:.8rem}
.stat-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* ═══════════════════════════════════
   TOOLBAR
═══════════════════════════════════ */
.toolbar{
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
  width:100%;max-width:900px;margin:0 auto 48px auto;
}

.search-wrap{
  flex:1;min-width:220px;
  position:relative;
}
.search-icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:rgba(0,242,254,.4);
  font-size:.95rem;pointer-events:none;
}
#search-input{
  width:100%;height:50px;
  background:rgba(17,23,38,.8);
  border:1px solid rgba(0,242,254,.18);
  border-radius:var(--radius-sm);
  color:var(--cream);
  font-family:'Syne',sans-serif;
  font-size:.92rem;
  padding:0 16px 0 44px;
  outline:none;
  transition:all .3s;
}
#search-input:focus{
  border-color:var(--acc);
  background:rgba(22,31,51,.9);
  box-shadow:0 0 20px rgba(0,242,254,.1);
}

.filter-pills{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fp{
  padding:8px 18px;
  background:rgba(17,23,38,.8);
  border:1px solid rgba(0,242,254,.15);
  border-radius:100px;
  color:var(--muted);
  font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;
  transition:all .3s cubic-bezier(.16,1,.3,1);
}
.fp:hover{border-color:var(--acc2);color:var(--acc);background:rgba(0,242,254,.05)}
.fp.active{
  background:rgba(0,242,254,.12);
  border-color:var(--acc);
  color:var(--acc);
  box-shadow:0 0 16px rgba(0,242,254,.15);
}

.results-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.results-count{font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
.results-count span{color:var(--acc2)}
.results-sort{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,242,254,.35)}

.divider{
  display:flex;align-items:center;gap:20px;
  margin-bottom:48px;opacity:.3;
}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--acc))}
.div-line.r{background:linear-gradient(90deg,var(--acc),transparent)}
.div-icon{color:var(--acc);font-size:.8rem}

/* ═══════════════════════════════════
   GRID & CARDS
═══════════════════════════════════ */
.grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:22px;
}

.card{
  position:relative;
  display:flex;flex-direction:column;
  background:linear-gradient(150deg,var(--bg2) 0%,var(--bg3) 100%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  text-decoration:none;color:inherit;
  cursor:pointer;
  transition:transform .5s cubic-bezier(.16,1,.3,1), border-color .35s, box-shadow .5s;
}

.card::before,.card::after{
  content:'';position:absolute;z-index:10;width:20px;height:20px;transition:all .4s;
}
.card::before{top:0;left:0;border-top:2px solid rgba(0,242,254,.4);border-left:2px solid rgba(0,242,254,.4);border-radius:var(--radius) 0 0 0}
.card::after{bottom:0;right:0;border-bottom:2px solid rgba(0,114,255,.3);border-right:2px solid rgba(0,114,255,.3);border-radius:0 0 var(--radius) 0}

.card:hover::before{width:36px;height:36px;border-color:var(--acc)}
.card:hover{
  transform:translateY(-12px) scale(1.01);
  border-color:var(--border2);
  box-shadow:0 32px 80px rgba(0,0,0,.65), 0 0 50px rgba(0,242,254,.05);
}

.card-line{
  position:absolute;top:0;left:0;right:0;height:2px;z-index:11;
  background:linear-gradient(90deg,transparent,var(--acc),var(--acc2),transparent);
  transform:scaleX(0);transform-origin:left;transition:transform .5s;
}
.card:hover .card-line{transform:scaleX(1)}

.card-img{
  position:relative;aspect-ratio:16/8;
  background:#0F1524;overflow:hidden;flex-shrink:0;
}
.card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .8s cubic-bezier(.16,1,.3,1);
  filter:brightness(.75);
}
.card:hover .card-img img{transform:scale(1.08);filter:brightness(.9)}

.card-img::after{
  content:'';position:absolute;inset:0;z-index:2;
  background:linear-gradient(180deg,transparent 30%,rgba(10,14,23,.95) 100%);
}

.card-num{
  position:absolute;bottom:8px;right:14px;z-index:5;
  font-family:'Bebas Neue',sans-serif;
  font-size:4rem;color:rgba(0,242,254,.05);line-height:1;
}
.card:hover .card-num{color:rgba(0,242,254,.1)}

.card-accent-bar{
  position:absolute;top:0;bottom:0;left:0;z-index:5;width:3px;
  background:linear-gradient(180deg,var(--acc),transparent);
}

.card-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:10px;flex:1;position:relative;z-index:5;}

.card-tag{
  display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
  font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--acc2);background:rgba(0,242,254,.06);
  border:1px solid rgba(0,242,254,.2);padding:4px 10px;border-radius:6px;
}
.tag-dot{width:4px;height:4px;border-radius:50%;background:var(--acc2);box-shadow:0 0 5px var(--acc2)}

.card-name{
  font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.05em;line-height:1.1;color:var(--cream);
}

.card-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:5px;font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.meta-icon{font-size:.75rem}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:14px;margin-top:4px;border-top:1px solid rgba(0,242,254,.08);
}
.cf-cta{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,242,254,.6);transition:all .3s}
.card:hover .cf-cta{color:var(--acc);letter-spacing:.22em}

.cf-arrow{
  width:34px;height:34px;border:1px solid rgba(0,242,254,.2);border-radius:8px;
  color:var(--acc);font-size:.85rem;display:flex;align-items:center;justify-content:center;
  background:rgba(0,242,254,.03);transition:all .3s;
}
.card:hover .cf-arrow{background:var(--acc);color:#0A0E17;box-shadow:0 0 15px var(--acc)}

.no-results{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:80px 20px;text-align:center}
.no-results-icon{font-size:2.5rem;opacity:.3;margin-bottom:16px}
.no-results-text{font-size:.8rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}

.page-footer{margin-top:80px;padding-top:40px;border-top:1px solid rgba(0,242,254,.08);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.pf-text{font-size:.58rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:rgba(0,242,254,.25)}

.card.hidden{display:none}

@media(max-width:768px){
  nav{padding:0 18px;height:62px}
  main{padding:calc(62px + 48px) 16px 80px}
  .grid{grid-template-columns:1fr;gap:16px}
  .toolbar{flex-direction:column;align-items:stretch}
  .filter-pills{display:none}
}
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-noise"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>

<nav>
  <a class="nav-brand" href="#">
    <div class="nav-logo-box">LX</div>
    <span class="nav-title">LEARN<em>EX</em></span>
  </a>
</nav>

<main>
  <div class="hero">
    <div class="hero-pill"><span class="pill-dot"></span>LEARNEX BATCHES</div>
    <h1 class="hero-h1">
      <span class="line-a">Choose Your</span>
      <span class="line-b">Learning Path</span>
    </h1>
    <p class="hero-sub">Pehle batch select karo, <strong>phir future build karo</strong></p>
    <div class="hero-stats">
      <div class="stat-item">🔥 <span class="stat-val" id="total-batches-badge">0</span> <span>Batches Available</span></div>
      <div class="stat-sep"></div>
      <div class="stat-item">⚡ <span>Live Access</span></div>
      <div class="stat-sep"></div>
      <div class="stat-item">🎯 <span>Self-Paced</span></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="SEARCH BATCH..." autocomplete="off" spellcheck="false">
    </div>
    <div class="filter-pills" id="dynamic-filters">
      <div class="fp active" data-filter="all">All</div>
    </div>
  </div>

  <div class="results-bar">
    <span class="results-count">Showing <span id="visible-count">0</span> batches</span>
    <span class="results-sort">A–Z Order</span>
  </div>

  <div class="divider">
    <span class="div-line"></span>
    <span class="div-icon">✦</span>
    <span class="div-line r"></span>
  </div>

  <div class="grid" id="batch-grid">
    <div class="no-results" id="no-results" style="display:none">
      <div class="no-results-icon">🔍</div>
      <p class="no-results-text">No batch found — try another keywords</p>
    </div>
  </div>

  <div class="page-footer">
    <p class="pf-text">LEARNEX — Work Hard, Dream Big ✦ Developed by Pratik</p>
  </div>
</main>

<script>
/* ── BACKGROUND PARTICLES ENGINE ── */
(function(){
  const c = document.getElementById('particles');
  const colors = ['#00F2FE','#4FACFE','#00D4AA','#0072FF'];
  for(let i=0;i<32;i++){
    const p=document.createElement('div');
    p.className='p';
    const col=colors[Math.floor(Math.random()*colors.length)];
    const s=(Math.random()*2.5+1.5)+'px';
    p.style.cssText=`
      --l:${Math.random()*100}%;
      --d:${6+Math.random()*14}s;
      --dl:${Math.random()*14}s;
      --dx:${(Math.random()-.5)*80}px;
      --c:${col};
      --s:${s};
      --gs:${parseFloat(s)*2.5}px;
    `;
    c.appendChild(p);
  }
})();

/* ── 3D INTEGRATED TILT EFFECT ── */
function applyTiltEffect() {
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      const x=(e.clientX-r.left)/r.width-.5;
      const y=(e.clientY-r.top)/r.height-.5;
      card.style.transform=`translateY(-12px) scale(1.01) rotateY(${x*5}deg) rotateX(${-y*4}deg)`;
    });
    card.addEventListener('mouseleave',()=>{card.style.transform=''});
  });
}

/* ── HIGH-SPEED LIVE BATCH DATA SYNC PIPELINE ── */
const CFG = {
  apiEndpoint: "https://ntxapi.wasmer.app/?course_id=176&action=content&rc=nt",
  fallbackThumb: "https://admin.nexttoppers.com/public/assets/dist/img/new-image/videoThumbnailImg.png"
};

async function syncLiveBatches() {
  try {
    const response = await fetch(CFG.apiEndpoint);
    const payload = await response.json();
    
    if (!payload.success || !payload.data) {
      console.error("Pipeline failure: Invalid dynamic response payload.");
      return;
    }

    // Filters down folder structures to map onto batch arrays natively
    const batchData = payload.data.filter(item => item.type === "folder");
    renderBatchSystem(batchData);
    generateDynamicFilters(batchData);
    
  } catch (error) {
    console.error("Dynamic sync breakdown:", error);
  }
}

function renderBatchSystem(batches) {
  const gridContainer = document.getElementById('batch-grid');
  const noResultsNode = document.getElementById('no-results');
  
  // Wipe placeholder nodes, preserve layout structure matrix
  gridContainer.querySelectorAll('.card').forEach(el => el.remove());

  batches.forEach((item, index) => {
    const formattedIndex = String(index + 1).padStart(2, '0');
    const totalVideos = item.data?.content_counts?.video?.paid || 0;
    const totalPDFs = item.data?.content_counts?.pdf?.paid || 0;
    
    // Auto-detect classification target tag dynamically from folder payload
    let targetClass = "Class 10th"; 
    if (item.title.toLowerCase().includes("8th")) targetClass = "Class 8th";
    if (item.title.toLowerCase().includes("9th")) targetClass = "Class 9th";
    if (item.title.toLowerCase().includes("11th")) targetClass = "Class 11th";
    if (item.title.toLowerCase().includes("12th")) targetClass = "Class 12th";
    if (item.title.toLowerCase().includes("cuet")) targetClass = "CUET Engine";

    const bannerImg = item.data?.thumbnail || CFG.fallbackThumb;

    const cardHTML = `
      <a class="card" href="workspace.html?course_id=${item.course_id}&folder_id=${item.entity_id}" data-name="${item.title.toLowerCase()}" data-tag="${targetClass.toLowerCase()}">
        <div class="card-line"></div>
        <div class="card-img">
          <div class="card-accent-bar"></div>
          <img src="${bannerImg}" alt="${item.title}" loading="lazy">
          <div class="card-num">${formattedIndex}</div>
        </div>
        <div class="card-body">
          <div class="card-tag">
            <span class="tag-dot"></span>
            ${targetClass}
          </div>
          <div class="card-name">${item.title.toUpperCase()}</div>
          <div class="card-meta">
            <div class="meta-item"><span class="meta-icon">📂</span> ${totalVideos} Videos</div>
            <div class="meta-item"><span class="meta-icon">▶</span> ${totalPDFs} PDFs</div>
          </div>
          <div class="card-footer">
            <span class="cf-cta">Start Learning</span>
            <span class="cf-arrow"><span class="a-icon">→</span></span>
          </div>
        </div>
      </a>
    `;
    
    // Inject node clean before error configurations
    noResultsNode.insertAdjacentHTML('beforebegin', cardHTML);
  });

  // Global badges updates
  document.getElementById('total-batches-badge').textContent = batches.length;
  document.getElementById('visible-count').textContent = batches.length;
  
  applyTiltEffect();
  initSearchEngine();
}

function generateDynamicFilters(batches) {
  const filterContainer = document.getElementById('dynamic-filters');
  const customTags = new Set();
  
  batches.forEach(item => {
    let targetClass = "Class 10th";
    if (item.title.toLowerCase().includes("8th")) targetClass = "Class 8th";
    if (item.title.toLowerCase().includes("9th")) targetClass = "Class 9th";
    if (item.title.toLowerCase().includes("11th")) targetClass = "Class 11th";
    if (item.title.toLowerCase().includes("12th")) targetClass = "Class 12th";
    if (item.title.toLowerCase().includes("cuet")) targetClass = "CUET Engine";
    customTags.add(targetClass);
  });

  customTags.forEach(tag => {
    const pill = document.createElement('div');
    pill.className = 'fp';
    pill.setAttribute('data-filter', tag.toLowerCase());
    pill.textContent = tag;
    filterContainer.appendChild(pill);
  });
}

/* ── DESKTOP & MOBILE INTEGRATED SEARCH & FILTER MATRIX ── */
function initSearchEngine() {
  const searchInput = document.getElementById('search-input');
  const cards = document.querySelectorAll('.card');
  const noResults = document.getElementById('no-results');
  const visCount = document.getElementById('visible-count');
  const filterBtns = document.querySelectorAll('.fp');
  let activeFilter = 'all';

  function filterCards(){
    const q = searchInput.value.trim().toLowerCase();
    let vis = 0;
    
    cards.forEach(card=>{
      const name = card.getAttribute('data-name') || '';
      const tag = card.getAttribute('data-tag') || '';
      const matchSearch = !q || name.includes(q) || tag.includes(q);
      const matchFilter = activeFilter === 'all' || tag === activeFilter.toLowerCase();
      
      if(matchSearch && matchFilter){
        card.classList.remove('hidden');
        vis++;
      } else {
        card.classList.add('hidden');
      }
    });
    
    visCount.textContent = vis;
    noResults.style.display = vis === 0 ? 'flex' : 'none';
  }

  searchInput.addEventListener('input', filterCards);

  filterBtns.forEach(btn=>{
    btn.replaceWith(btn.cloneNode(true)); // Wipe old listeners cleanly
  });

  document.querySelectorAll('.fp').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fp').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.getAttribute('data-filter');
      filterCards();
    });
  });
}

// Fire dynamic real-time alignment synchronization loop on page setup
window.addEventListener('DOMContentLoaded', syncLiveBatches);
</script>
