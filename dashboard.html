<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Grid Dashboard · NexCoderZ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#06050a; --surface:#12101a; --border:#231f33; --gold:#ff3366; --gold2:#9d4edd; --muted:#7d72a1; --white:#f5f3f9; }
body { background:var(--bg); color:#dcd7ec; font-family:'Manrope',sans-serif; padding:40px 16px; }
.main { max-width:1100px; margin:0 auto; }
.hdr-block { text-align:center; margin-bottom:40px; }
h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2.3rem,5vw,4rem); line-height:1; color:var(--white); }
h1 em { font-style:normal; background:linear-gradient(110deg, var(--gold), var(--gold2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.toolbar { display:flex; gap:12px; margin-bottom:24px; }
.search-input { width:100%; height:48px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:0 16px; color:#fff; outline:none; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(290px, 1fr)); gap:20px; }
.card { background:linear-gradient(150deg, var(--surface) 0%, #151221 100%); border:1px solid var(--border); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; text-decoration:none; color:inherit; cursor: pointer; transition:transform 0.3s; }
.card:hover { transform:translateY(-5px); border-color:var(--gold); }
.img-wrap { aspect-ratio:16/9; background:#000; overflow:hidden; }
.img-wrap img { width:100%; height:100%; object-fit:cover; opacity:0.85; }
.body { padding:18px; display:flex; flex-direction:column; gap:8px; flex:1; }
.title { font-size:1.1rem; font-weight:700; color:var(--white); }
.meta { display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; color:var(--muted); margin-top:auto; }
</style>
</head>
<body>
<div class="main">
    <div class="hdr-block"><h1>Pick Your <br><em>Batch Dashboard.</em></h1></div>
    <div class="toolbar"><input type="text" id="search" class="search-input" placeholder="SEARCH BATCH..." oninput="filterGridData()"></div>
    <div class="grid" id="grid-slot"></div>
</div>
<script>
if(localStorage.getItem('ncz_session_pass') !== 'active') { window.location.href = 'index.html'; }

let seededDb = [
    { id: '176', title: 'AARAMBH 10th BATCH 2026-27', img: 'https://dylnd2lqy6eys.cloudfront.net/1770981347/admin_v2/uploads/courses/thumbnail/4628574_125_aarambh%20banner%20app%202026%202.jpg', video: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', cat: 'Class 10th' },
    { id: '177', title: 'NIRMAAN BATCH Class 8th Board', img: 'https://dylnd2lqy6eys.cloudfront.net/1770981347/admin_v2/uploads/courses/thumbnail/6956338_125_Nirbhay%20Batch%20Class%208th%20App%20Banners09.jpg', video: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', cat: 'Class 8th' }
];

function loadDatabaseGrid() {
    if(!localStorage.getItem('ncz_db')) { localStorage.setItem('ncz_db', JSON.stringify(seededDb)); }
    const currentDb = JSON.parse(localStorage.getItem('ncz_db'));
    document.getElementById('grid-slot').innerHTML = currentDb.map(item => `
        <div class="card" onclick="openWorkspaceRouter('${item.id}')">
            <div class="img-wrap"><img src="${item.img}" alt="img"></div>
            <div class="body">
                <div class="title">${item.title}</div>
                <div class="meta"><span>${item.cat}</span><span style="color:var(--gold); font-weight:bold;">Open →</span></div>
            </div>
        </div>
    `).join('');
}
function openWorkspaceRouter(id) { sessionStorage.setItem('active_course_session_id', id); window.location.href = 'workspace.html'; }
function filterGridData() {
    const query = document.getElementById('search').value.toLowerCase().trim();
    document.querySelectorAll('.card').forEach(c => {
        const text = c.querySelector('.title').textContent.toLowerCase();
        c.style.display = text.includes(query) ? 'flex' : 'none';
    });
}
window.addEventListener('load', loadDatabaseGrid);
</script>
</body>
</html>
