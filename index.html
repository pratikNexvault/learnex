<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://i.postimg.cc/KzTy05Wm/IMG-20250301-092318-614.jpg" type="image/x-icon">
<title>NexCoderZ Portal — Pick Platform</title>
<script src="https://cdn.tailwindcss.com/"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a090f; --surface: #12101a; --border: #231f33;
  --gold: #ff3366; --gold2: #9d4edd; --dim: #4d4666; --muted: #7d72a1;
  --white: #f5f3f9;
}
body { background: var(--bg); color: #dcd7ec; font-family: 'JetBrains Mono', monospace; min-height: 100vh; overflow-x: hidden; }
body::after { content:''; position:fixed; inset:0; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px); pointer-events:none; z-index:100; }
.global-grid { position:fixed; inset:0; z-index:0; pointer-events:none; background-image: linear-gradient(var(--border) 1px,transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:44px 44px; opacity:.25; }
.wrap { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:0 20px; }
header { padding:44px 20px 0; max-width:680px; margin:0 auto; }
.hrow { display:flex; align-items:baseline; gap:8px; margin-bottom:5px; }
.logo { font-family:'Space Mono',monospace; font-size:1.25rem; font-weight:700; color:var(--white); letter-spacing:-.02em; }
.logo em { color:var(--gold); font-style:normal; }
.blink { display:inline-block; width:2px; height:1.1em; background:var(--gold); vertical-align:middle; margin-left:2px; animation:bl 1.1s step-end infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:0} }
.sep { height:1px; background:var(--border); margin:28px 0; }
.intro h2 { font-family:'Space Mono',monospace; font-size:clamp(1.45rem,4vw,2.1rem); font-weight:700; color:var(--white); line-height:1.15; letter-spacing:-.03em; margin-bottom:14px; }
.cards { display:flex; flex-direction:column; gap:12px; margin-top:8px; }
.card-node { display:flex; align-items:center; gap:16px; padding:18px 16px; background:var(--surface); border:1px solid var(--border); border-radius:12px; text-decoration:none; color:inherit; position:relative; overflow:hidden; cursor: pointer; }
.card-node::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--gold); opacity:0; transition:opacity .2s; }
.card-node:hover { border-color:rgba(255,51,102,.3); background:rgba(255,51,102,.02); }
.card-node:hover::before { opacity:1; }
.cnum { font-size:.6rem; color:var(--dim); min-width:18px; }
.cimg { width:46px; height:46px; border-radius:8px; object-fit:cover; border:1px solid var(--border); }
.cbody { flex:1; min-width:0; }
.cbody h3 { font-family:'Space Mono',monospace; font-size:.9rem; font-weight:700; color:var(--white); }
footer { border-top:1px solid var(--border); margin-top:40px; padding:20px 0; display:flex; justify-content:space-between; font-size:0.65rem; color:var(--dim); }
</style>
</head>
<body>
<div class="global-grid"></div>
<header>
    <div class="hrow">
        <span class="logo">Nex<em>CoderZ</em></span>
        <span class="blink"></span>
    </div>
</header>
<div class="wrap">
    <div class="sep"></div>
    <div class="intro">
        <h2>Pick your <br><span style="color:var(--gold);">institute infrastructure.</span></h2>
        <p style="font-size:0.75rem; color:var(--muted)">Direct isolated routing connections to course repositories.</p>
    </div>
    <div class="sep"></div>
    <div class="cards">
        <div class="card-node" onclick="checkGateRedirect()">
            <span class="cnum">01</span>
            <img class="cimg" src="https://static.pw.live/5eb393ee95fab7468a79d189/GLOBAL_CMS/f10eb934-422b-448f-aa2c-157078acb032.webp" alt="PW">
            <div class="cbody"><h3>Physics Wallah Classes</h3><div style="font-size:0.65rem; color:var(--muted)">ALL Batches Module Access</div></div>
        </div>
        <div class="card-node" onclick="checkGateRedirect()">
            <span class="cnum">02</span>
            <img class="cimg" src="https://nocache-appxdb-v2.classx.co.in/subject/2026-02-24-0.8461171343418096.png" alt="NT">
            <div class="cbody"><h3>Next Toppers Portal</h3><div style="font-size:0.65rem; color:var(--muted)">Board Exam Automated Streams</div></div>
        </div>
    </div>
    <footer><span>NexCoderZ Base Terminal // 2026</span><span>v1.2.0</span></footer>
</div>
<script>
function checkGateRedirect() {
    if(localStorage.getItem('ncz_session_pass') === 'active') { window.location.href = 'dashboard.html'; }
    else { window.location.href = 'verify.html'; }
}
let visits = parseInt(localStorage.getItem('ncz_hits_today') || '0');
localStorage.setItem('ncz_hits_today', visits + 1);
</script>
</body>
</html>
