<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard · NexCoderZ</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0a090f; --surface:#12101a; --border:#231f33; --gold:#ff3366; --gold2:#9d4edd; --muted:#7d72a1; }
body { background:var(--bg); color:#dcd7ec; font-family:'Manrope',sans-serif; padding:20px 12px; }
.panel { max-width:850px; margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; display: none; }
.panel.show-panel { display: block; }
.inp { width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:#fff; margin-bottom:10px; outline:none; font-size:0.85rem; }
.btn { padding:10px 20px; background:linear-gradient(135deg, var(--gold), var(--gold2)); border:none; border-radius:6px; color:#fff; font-weight:bold; font-size:0.85rem; cursor: pointer; }
.table { width:100%; border-collapse:collapse; margin-top:16px; }
.table th, .table td { padding:10px; border:1px solid var(--border); text-align:left; font-size:0.75rem; }
.table th { background:var(--bg); color:var(--gold); }
</style>
</head>
<body>

<div class="panel" id="adminMainPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:16px;">
        <h2 style="font-family:'Space Mono', monospace; color:var(--gold); font-size:1.1rem;">NexCoderZ Master Control Center</h2>
        <button class="btn" style="background:#231f33" onclick="window.location.href='index.html'">Exit</button>
    </div>

    <div style="display:grid; grid-template-columns:1fr; gap:12px; margin-bottom:16px;">
        <div style="background:rgba(255,255,255,0.01); border:1px solid var(--border); padding:12px; border-radius:8px; text-align:center;">
            <span style="font-size:2rem; font-weight:900; color:var(--gold2);" id="hits-slot">0</span>
            <div style="font-size:0.6rem; text-transform:uppercase; color:var(--muted); letter-spacing:0.1em; margin-top:2px;">Today's Analytics Traffic Views</div>
        </div>
        <div style="background:rgba(255,255,255,0.01); border:1px solid var(--border); padding:8px; border-radius:8px;">
            <canvas id="chart" style="max-height:100px; width:100%;"></canvas>
        </div>
    </div>

    <div style="background:rgba(255,255,255,0.01); border:1px solid var(--border); padding:14px; border-radius:8px; margin-bottom:12px;">
        <h3 style="font-size:0.8rem; font-weight:bold; margin-bottom:8px; color:#fff;">System Configurations Panel</h3>
        <input type="text" id="cfg-link" class="inp" placeholder="Monetization Shortlink Link URL Option">
        <input type="text" id="cfg-path" class="inp" placeholder="Success verification string path parameter (e.g. ?verify=success)">
        <input type="password" id="cfg-pass" class="inp" placeholder="Change System Access Admin Dashboard Password">
        <button class="btn" onclick="commitConfigurations()">Save System Matrix</button>
    </div>

    <div style="background:rgba(255,255,255,0.01); border:1px solid var(--border); padding:14px; border-radius:8px; margin-bottom:12px;">
        <h3 style="font-size:0.8rem; font-weight:bold; margin-bottom:8px; color:#fff;">Publish New Course Batch Node Item</h3>
        <input type="text" id="node-title" class="inp" placeholder="Batch Title Layout Name">
        <input type="text" id="node-img" class="inp" placeholder="Thumbnail Image URL Assets Link">
        <input type="text" id="node-video" class="inp" placeholder="Adaptive M3U8 Stream Connection Link Source">
        <input type="text" id="node-cat" class="inp" placeholder="Category (e.g. Class 10th)">
        <button class="btn" onclick="publishBatchNodeItem()">Publish Node Vector</button>
    </div>

    <table class="table">
        <thead><tr><th>Batch Name Title</th><th>Category</th><th>Action</th></tr></thead>
        <tbody id="inventory-table-slot"></tbody>
    </table>
</div>

<script>
function triggerAdminSecurityGateChallenge() {
    const activeMasterPassword = localStorage.getItem('ncz_master_password') || 'nexaX1977';

    Swal.fire({
        title: 'Master Control Decryption Challenge',
        input: 'password', 
        inputPlaceholder: 'Enter security configuration credentials password...',
        backgroundColor: '#12101a', 
        color: '#fff', 
        confirmButtonText: 'Decrypt Gate', 
        allowOutsideClick: false,
        allowEscapeKey: false,
        preConfirm: (inputValue) => {
            // Fix: Agar password match nahi hua toh popup band nahi hoga aur error dikhayega
            if (inputValue !== activeMasterPassword) {
                Swal.showValidationMessage('Invalid Signature Key! Try again.');
                return false;
            }
            return inputValue;
        }
    }).then((res) => {
        if(res.isConfirmed) { 
            showToast('Access granted! Initializing dashboard matrix...', true);
            document.getElementById('adminMainPanel').classList.add('show-panel');
            initAdminPortalWorkspacePanel(); 
        }
    });
}

function initAdminPortalWorkspacePanel() {
    const hits = localStorage.getItem('ncz_hits_today') || '164';
    document.getElementById('hits-slot').textContent = hits;
    const ctx = document.getElementById('chart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: { labels: ['W1', 'W2', 'W3', 'W4'], datasets: [{ data: [110, 290, 180, parseInt(hits)], borderColor: '#ff3366', borderWidth: 1.5, tension: 0.4, fill: false }] },
        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
    if(localStorage.getItem('ncz_shortlink')) document.getElementById('cfg-link').value = localStorage.getItem('ncz_shortlink');
    if(localStorage.getItem('ncz_verify_path')) document.getElementById('cfg-path').value = localStorage.getItem('ncz_verify_path');
    renderInventoryTableNodes();
}

function renderInventoryTableNodes() {
    const db = JSON.parse(localStorage.getItem('ncz_db') || '[]');
    document.getElementById('inventory-table-slot').innerHTML = db.map((item, idx) => `
        <tr><td>${item.title}</td><td>${item.cat}</td><td><button class="btn" style="background:var(--rd); padding:4px 8px; font-size:0.7rem;" onclick="purgeNodeIndex(${idx})">Purge</button></td></tr>
    `).join('');
}

function publishBatchNodeItem() {
    const title = document.getElementById('node-title').value;
    const img = document.getElementById('node-img').value;
    const video = document.getElementById('node-video').value;
    const cat = document.getElementById('node-cat').value;
    if(!title || !img || !video) return alert('Fill core cells parameters.');
    let db = JSON.parse(localStorage.getItem('ncz_db') || '[]');
    db.push({ id: String(Date.now()), title, img, video, cat: cat || 'General' });
    localStorage.setItem('ncz_db', JSON.stringify(db));
    renderInventoryTableNodes();
    
    document.getElementById('node-title').value = '';
    document.getElementById('node-img').value = '';
    document.getElementById('node-video').value = '';
    document.getElementById('node-cat').value = '';
    showToast('Batch node published successfully!', true);
}

function purgeNodeIndex(idx) {
    let db = JSON.parse(localStorage.getItem('ncz_db') || '[]');
    db.splice(idx, 1);
    localStorage.setItem('ncz_db', JSON.stringify(db));
    renderInventoryTableNodes();
    showToast('Node removed from database index.');
}

function commitConfigurations() {
    localStorage.setItem('ncz_shortlink', document.getElementById('cfg-link').value);
    localStorage.setItem('ncz_verify_path', document.getElementById('cfg-path').value);
    const pass = document.getElementById('cfg-pass').value;
    if(pass.trim().length >= 4) {
        localStorage.setItem('ncz_master_password', pass);
        showToast('Password and systems settings configured!', true);
    } else {
        showToast('Configurations link updated!', true);
    }
}

function showToast(msg, ok) {
    Swal.fire({ toast: true, position: 'top-end', icon: ok?'success':'info', title: msg, showConfirmButton: false, timer: 1800, backgroundColor: '#12101a', color: '#fff' });
}

window.addEventListener('load', triggerAdminSecurityGateChallenge);
</script>
</body>
</html>
