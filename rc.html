<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Dashboard</title>

    <!-- ── Authentication Guard (runs synchronously before anything renders) ── -->
    <script>
    (function () {
        var access = sessionStorage.getItem('main_access');
        var expiry = sessionStorage.getItem('main_expiry');
        if (!access || !expiry || Date.now() > parseInt(expiry, 10)) {
            sessionStorage.removeItem('main_access');
            sessionStorage.removeItem('main_expiry');
            window.location.replace('/PW');
        }
    })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #06080f;
            --surface:  #0c1018;
            --card:     #0f1520;
            --card-h:   #141d2e;
            --b0:       rgba(255,255,255,.055);
            --b1:       rgba(255,255,255,.10);
            --a1:       #5b5ef4;
            --a2:       #9b59f5;
            --a3:       #0ea5e9;
            --green:    #10b981;
            --cyan:     #22d3ee;
            --amber:    #f59e0b;
            --red:      #ef4444;
            --t0:       #f1f5ff;
            --t1:       #8895ae;
            --t2:       #3d4a5c;
            --r:        14px;
            --r2:       20px;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family: 'Geist', system-ui, sans-serif;
            background: var(--bg);
            color: var(--t0);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Ambient mesh bg ─────────────────────────────────────────────── */
        .gfx {
            position: fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
        }
        .gfx-blob {
            position: absolute; border-radius:50%; filter:blur(100px);
        }
        .gfx-blob.b1 {
            width:700px; height:450px; top:-160px; left:-120px;
            background: radial-gradient(ellipse, rgba(91,94,244,.13) 0%, transparent 70%);
            animation: drift1 20s ease-in-out infinite alternate;
        }
        .gfx-blob.b2 {
            width:600px; height:400px; bottom:-100px; right:-120px;
            background: radial-gradient(ellipse, rgba(155,89,245,.09) 0%, transparent 70%);
            animation: drift2 25s ease-in-out infinite alternate;
        }
        .gfx-blob.b3 {
            width:400px; height:300px; top:40%; left:40%;
            background: radial-gradient(ellipse, rgba(14,165,233,.06) 0%, transparent 70%);
            animation: drift1 30s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift1 {
            0%   { transform: translate(0,0) scale(1); }
            50%  { transform: translate(50px,35px) scale(1.08); }
            100% { transform: translate(-25px,70px) scale(0.96); }
        }
        @keyframes drift2 {
            0%   { transform: translate(0,0) scale(1); }
            50%  { transform: translate(-40px,-30px) scale(1.06); }
            100% { transform: translate(30px,-60px) scale(0.94); }
        }
        .gfx-dots {
            position:absolute; inset:0;
            background-image: radial-gradient(circle, rgba(255,255,255,.022) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 82%, transparent 100%);
        }

        /* ─── Page load overlay ───────────────────────────────────────────── */
        #page-loader {
            position:fixed; inset:0; z-index:9000;
            background: var(--bg);
            display:flex; align-items:center; justify-content:center;
            flex-direction:column; gap:18px;
            transition: opacity .35s ease, visibility .35s ease;
        }
        #page-loader.hidden { opacity:0; visibility:hidden; }
        .loader-logo {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size:22px; font-weight:800; color:var(--t0);
            letter-spacing:-.02em;
        }
        .loader-logo span { color:var(--a1); }
        .loader-ring {
            width:44px; height:44px; border-radius:50%;
            border:2.5px solid var(--b1);
            border-top-color: var(--a1);
            border-right-color: var(--a2);
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loader-dots {
            display:flex; gap:7px;
        }
        .loader-dots span {
            width:6px; height:6px; border-radius:50%;
            background:var(--a1); opacity:.3;
            animation: ldot .9s ease infinite;
        }
        .loader-dots span:nth-child(2){ animation-delay:.15s; background:var(--a2); }
        .loader-dots span:nth-child(3){ animation-delay:.30s; background:var(--cyan); }
        @keyframes ldot {
            0%,80%,100%{ opacity:.2; transform:scale(.8); }
            40%        { opacity:1;  transform:scale(1.15); }
        }

        /* ─── Progress bar ────────────────────────────────────────────────── */
        #bar {
            position:fixed; top:0; left:0; height:2px; width:0%;
            background: linear-gradient(90deg, var(--a1), var(--a2), var(--cyan));
            z-index:9999;
            box-shadow: 0 0 10px var(--a1), 0 0 22px rgba(91,94,244,.5);
            transition: width .3s cubic-bezier(.4,0,.2,1), opacity .25s ease;
            border-radius: 0 2px 2px 0;
        }
        #bar.fin { width:100% !important; opacity:0; }

        /* ─── Navbar ──────────────────────────────────────────────────────── */
        .nav {
            position:sticky; top:0; z-index:400;
            height:58px;
            background: rgba(6,8,15,.82);
            backdrop-filter: blur(32px) saturate(1.6);
            -webkit-backdrop-filter: blur(32px) saturate(1.6);
            border-bottom: 1px solid var(--b0);
            display:flex; align-items:center;
            padding: 0 16px; gap:12px;
        }
        .back-btn {
            display:inline-flex; align-items:center; gap:.45rem;
            padding:.45rem 1rem; border-radius:100px;
            background:var(--card); border:1px solid var(--b0);
            color:var(--t1); font-size:.82rem; font-weight:600;
            cursor:pointer; transition:all .2s ease;
            font-family:inherit; text-decoration:none;
        }
        .back-btn:hover {
            background:rgba(91,94,244,.12);
            border-color:rgba(91,94,244,.3);
            color:#a5b4fc; transform:translateX(-2px);
        }
        .back-btn svg { flex-shrink:0; }
        .nav-logo {
            font-family:'Bricolage Grotesque',sans-serif;
            font-size:1.05rem; font-weight:800; color:var(--t0);
            letter-spacing:-.02em;
        }
        .nav-logo span { color:var(--a1); }

        /* ─── Hero ────────────────────────────────────────────────────────── */
        .hero {
            position:relative; z-index:1;
            padding: 40px 20px 28px;
            border-bottom: 1px solid var(--b0);
            animation: up .45s ease both;
        }
        .hero-inner { max-width:1280px; margin:0 auto; }
        .hero-eyebrow {
            display:inline-flex; align-items:center; gap:.4rem;
            font-size:.72rem; font-weight:700; letter-spacing:.12em;
            text-transform:uppercase; color:var(--a1);
            background:rgba(91,94,244,.1); border:1px solid rgba(91,94,244,.22);
            padding:.3rem .85rem; border-radius:100px; margin-bottom:1rem;
        }
        .hero-title {
            font-family:'Bricolage Grotesque',sans-serif;
            font-size: clamp(26px,5.5vw,44px);
            font-weight:800; line-height:1.1; letter-spacing:-.03em;
            color:var(--t0); margin-bottom:1rem; max-width:860px;
        }
        .hero-title .hl {
            background: linear-gradient(135deg, #818cf8 0%, var(--cyan) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .hero-chips { display:flex; flex-wrap:wrap; gap:.5rem; }
        .chip {
            font-size:.76rem; font-weight:600;
            padding:.32rem .82rem; border-radius:100px;
            background:rgba(255,255,255,.04); border:1px solid var(--b0);
            color:var(--t1);
        }

        /* ─── Tabs ────────────────────────────────────────────────────────── */
        .tabs-wrap {
            position:sticky; top:58px; z-index:300;
            background:rgba(6,8,15,.85); backdrop-filter:blur(24px);
            border-bottom:1px solid var(--b0);
            padding:0 16px;
        }
        .tabs-inner {
            max-width:1280px; margin:0 auto;
            display:flex; gap:0; overflow-x:auto;
            scrollbar-width:none;
        }
        .tabs-inner::-webkit-scrollbar { display:none; }
        .tab-btn {
            position:relative; display:flex; align-items:center; gap:.4rem;
            padding:.9rem 1.1rem; border:none; background:transparent;
            color:var(--t2); font-family:inherit; font-size:.85rem;
            font-weight:600; cursor:pointer; white-space:nowrap;
            transition:color .2s; border-bottom:2px solid transparent;
        }
        .tab-btn:hover { color:var(--t1); }
        .tab-btn.active { color:var(--t0); border-bottom-color:var(--a1); }
        .tab-icon { font-size:.95rem; }
        .tab-count {
            font-size:.67rem; font-weight:700;
            background:rgba(91,94,244,.2); color:#818cf8;
            padding:.1rem .42rem; border-radius:6px;
        }
        .tab-live-dot {
            width:6px; height:6px; border-radius:50%;
            background:var(--red); animation:blink 1.2s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

        /* ─── Content area ────────────────────────────────────────────────── */
        .content-wrap {
            position:relative; z-index:1;
            max-width:1280px; margin:0 auto;
            padding:28px 20px 80px;
        }
        .section { display:none; animation:fadeUp .35s ease forwards; }
        .section.active { display:block; }
        @keyframes fadeUp {
            from{ opacity:0; transform:translateY(14px); }
            to  { opacity:1; transform:translateY(0); }
        }

        /* ─── Section header ──────────────────────────────────────────────── */
        .sec-head {
            display:flex; align-items:baseline; gap:.75rem;
            margin-bottom:1.4rem;
        }
        .sec-head h2 {
            font-family:'Bricolage Grotesque',sans-serif;
            font-size:1.4rem; font-weight:700; color:var(--t0); letter-spacing:-.02em;
        }
        .sec-head .count { font-size:.78rem; font-weight:600; color:var(--t2); }

        /* ─── Description card ────────────────────────────────────────────── */
        .desc-card {
            background:var(--card); border:1px solid var(--b0);
            border-radius:var(--r2); padding:1.75rem 2rem; margin-bottom:1.25rem;
            transition:border-color .2s;
        }
        .desc-card:hover { border-color:rgba(91,94,244,.25); }
        .desc-card * { font-family:'Geist',sans-serif !important; color:var(--t1) !important; }
        .desc-card .main-text { color:var(--cyan) !important; font-weight:700 !important; }

        /* ─── Teachers row ────────────────────────────────────────────────── */
        .teachers-row {
            display:flex; gap:1rem; overflow-x:auto;
            scrollbar-width:none; padding:.25rem .1rem 1rem;
        }
        .teachers-row::-webkit-scrollbar { display:none; }
        .tc {
            flex:0 0 150px; background:var(--card);
            border:1px solid var(--b0); border-radius:var(--r2);
            overflow:hidden; transition:all .25s ease;
        }
        .tc:hover {
            border-color:rgba(91,94,244,.35);
            transform:translateY(-4px);
            box-shadow:0 12px 36px rgba(0,0,0,.4);
        }
        .tc-arch {
            height:140px; background:linear-gradient(160deg,#1a1640 0%,#0e1235 100%);
            position:relative; overflow:hidden;
            display:flex; align-items:flex-end; justify-content:center;
        }
        .tc-arch::before {
            content:''; position:absolute; bottom:0; left:50%;
            transform:translateX(-50%); width:190px; height:95px;
            border-radius:50% 50% 0 0; border:2px solid rgba(91,94,244,.25);
        }
        .tc-arch::after {
            content:''; position:absolute; bottom:0; left:50%;
            transform:translateX(-50%); width:130px; height:65px;
            border-radius:50% 50% 0 0; border:2px solid rgba(91,94,244,.45);
        }
        .tc-img {
            position:relative; z-index:2; width:90px; height:115px;
            object-fit:cover; object-position:top; display:block; margin:0 auto;
            filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));
        }
        .tc-body { padding:.75rem; text-align:center; }
        .tc-name { font-size:.82rem; font-weight:700; color:var(--t0); margin-bottom:.2rem; line-height:1.3; }
        .tc-sub  { font-size:.7rem; color:var(--t2); font-weight:500; }
        .tc-exp  {
            display:inline-block; margin-top:.4rem;
            font-size:.65rem; font-weight:700; color:var(--amber);
            background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.2);
            padding:.15rem .55rem; border-radius:100px;
        }

        /* ─── Subjects bento ──────────────────────────────────────────────── */
        .bento {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap:1rem;
        }
        .subj-card {
            background:var(--card); border:1px solid var(--b0);
            border-radius:var(--r2); padding:1.25rem;
            display:flex; align-items:center; gap:1rem;
            text-decoration:none; color:inherit; cursor:pointer;
            transition:all .25s ease; position:relative; overflow:hidden;
        }
        .subj-card::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(135deg,rgba(91,94,244,0) 0%,rgba(91,94,244,.07) 100%);
            opacity:0; transition:opacity .25s;
        }
        .subj-card:hover::before { opacity:1; }
        .subj-card:hover {
            border-color:rgba(91,94,244,.35);
            transform:translateY(-3px);
            box-shadow:0 14px 40px rgba(0,0,0,.35);
        }
        /* Left glow strip */
        .subj-card::after {
            content:''; position:absolute; left:0; top:18px; bottom:18px; width:3px;
            background:linear-gradient(to bottom,var(--a1),var(--a2));
            border-radius:0 3px 3px 0;
            opacity:0; transform:scaleY(.3);
            transition:opacity .22s, transform .22s;
        }
        .subj-card:hover::after { opacity:1; transform:scaleY(1); }
        .subj-img-wrap {
            width:52px; height:52px; border-radius:13px;
            background:rgba(91,94,244,.12); flex-shrink:0;
            overflow:hidden; position:relative; z-index:1;
        }
        .subj-img { width:100%; height:100%; object-fit:cover; }
        .subj-info { flex:1; min-width:0; position:relative; z-index:1; }
        .subj-name {
            font-family:'Bricolage Grotesque',sans-serif;
            font-size:.92rem; font-weight:700; color:var(--t0);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:.3rem;
        }
        .subj-meta { display:flex; align-items:center; gap:.4rem; }
        .badge {
            font-size:.68rem; font-weight:700;
            padding:.2rem .6rem; border-radius:100px;
        }
        .badge-count { background:rgba(34,211,238,.1); color:var(--cyan); border:1px solid rgba(34,211,238,.2); }
        .badge-soon  { background:rgba(61,74,92,.15); color:var(--t2); border:1px solid rgba(61,74,92,.2); }
        .subj-teacher-row {
            display:flex; align-items:center; gap:.4rem; margin-top:.45rem;
        }
        .subj-tpic {
            width:20px; height:20px; border-radius:50%;
            object-fit:cover; flex-shrink:0; border:1.5px solid rgba(91,94,244,.3);
        }
        .subj-tname {
            font-size:.7rem; color:var(--t2); font-weight:500;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .subj-arrow {
            flex-shrink:0; width:28px; height:28px; border-radius:50%;
            background:rgba(91,94,244,.12); display:flex; align-items:center;
            justify-content:center; font-size:.8rem; color:#818cf8;
            transition:all .2s; position:relative; z-index:1;
        }
        .subj-card:hover .subj-arrow { background:var(--a1); color:#fff; transform:translateX(2px); }

        /* ─── Live grid ───────────────────────────────────────────────────── */
        .live-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap:1.1rem;
        }
        .lc {
            background:var(--card); border:1px solid var(--b0);
            border-radius:var(--r2); overflow:hidden;
            transition:all .25s ease; text-decoration:none;
            color:inherit; display:block;
        }
        .lc:hover {
            border-color:rgba(91,94,244,.35);
            transform:translateY(-4px);
            box-shadow:0 18px 48px rgba(0,0,0,.4);
        }
        .lc-disabled { opacity:.62; cursor:not-allowed; }
        .lc-thumb { position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--surface); }
        .lc-thumb img {
            width:100%; height:100%; object-fit:cover; display:block;
            transition:transform .4s ease;
        }
        .lc:hover .lc-thumb img { transform:scale(1.04); }
        .lc-thumb-overlay {
            position:absolute; inset:0;
            background:linear-gradient(to top,rgba(6,8,15,.8) 0%,transparent 60%);
        }
        .lc-play {
            position:absolute; inset:0; display:flex;
            align-items:center; justify-content:center;
            opacity:0; transition:opacity .3s;
        }
        .lc:hover .lc-play { opacity:1; }
        .lc-play-icon {
            width:52px; height:52px;
            background:rgba(255,255,255,.14); backdrop-filter:blur(8px);
            border:2px solid rgba(255,255,255,.28); border-radius:50%;
            display:flex; align-items:center; justify-content:center; font-size:1.2rem;
        }
        .lc-badge {
            position:absolute; top:.65rem; left:.65rem;
            font-size:.62rem; font-weight:800; letter-spacing:.08em;
            text-transform:uppercase; padding:.25rem .72rem; border-radius:100px;
        }
        .badge-live-s {
            background:rgba(239,68,68,.2); color:#fca5a5;
            border:1px solid rgba(239,68,68,.4);
            animation:glow-red 1.5s ease infinite;
        }
        @keyframes glow-red {
            0%,100%{ box-shadow:0 0 8px rgba(239,68,68,.25); }
            50%    { box-shadow:0 0 18px rgba(239,68,68,.6); }
        }
        .badge-ended-s   { background:rgba(100,116,139,.15); color:#94a3b8; border:1px solid rgba(100,116,139,.22); }
        .badge-pending-s { background:rgba(245,158,11,.15); color:#fcd34d; border:1px solid rgba(245,158,11,.28); }
        .lc-body { padding:1.1rem; }
        .lc-subject {
            font-size:.68rem; font-weight:700; letter-spacing:.08em;
            text-transform:uppercase; color:var(--cyan); margin-bottom:.35rem;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .lc-topic {
            font-family:'Bricolage Grotesque',sans-serif;
            font-size:.95rem; font-weight:700; color:var(--t0);
            line-height:1.4; margin-bottom:.65rem;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
        }
        .lc-meta {
            display:flex; flex-wrap:wrap; gap:.35rem .65rem;
            font-size:.74rem; color:var(--t2); font-weight:500; margin-bottom:.75rem;
        }
        .lc-tags { display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.85rem; }
        .lc-tag {
            font-size:.65rem; font-weight:700;
            padding:.18rem .55rem; border-radius:7px;
            background:rgba(91,94,244,.12); color:#818cf8;
            border:1px solid rgba(91,94,244,.2);
        }
        .lc-btn {
            width:100%; padding:.6rem; border-radius:11px;
            font-size:.8rem; font-weight:700; text-align:center; letter-spacing:.01em;
        }
        .lc-btn-on {
            background:linear-gradient(135deg,var(--a1) 0%,#7c3aed 100%);
            color:#fff; box-shadow:0 4px 18px rgba(91,94,244,.3);
        }
        .lc-btn-off {
            background:rgba(61,74,92,.1); color:var(--t2);
            border:1px solid rgba(61,74,92,.18);
        }

        /* ─── Announcements ───────────────────────────────────────────────── */
        .ann-list { display:flex; flex-direction:column; gap:1rem; }
        .ann-card {
            background:var(--card); border:1px solid var(--b0);
            border-radius:var(--r2); overflow:hidden; transition:all .25s;
        }
        .ann-card:hover { border-color:rgba(91,94,244,.28); box-shadow:0 8px 28px rgba(0,0,0,.3); }
        .ann-img { width:100%; height:auto; display:block; }
        .ann-body { padding:1.35rem 1.5rem; }
        .ann-top { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; margin-bottom:.6rem; }
        .ann-badge {
            font-size:.63rem; font-weight:800; letter-spacing:.06em;
            text-transform:uppercase; padding:.22rem .65rem; border-radius:100px;
        }
        .ann-general { background:rgba(91,94,244,.15);  color:#818cf8; border:1px solid rgba(91,94,244,.25); }
        .ann-dpp     { background:rgba(245,158,11,.15); color:var(--amber); border:1px solid rgba(245,158,11,.28); }
        .ann-lecture { background:rgba(34,211,238,.12); color:var(--cyan); border:1px solid rgba(34,211,238,.22); }
        .ann-offer   { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.22); }
        .ann-heading { font-family:'Bricolage Grotesque',sans-serif; font-size:1rem; font-weight:700; color:var(--t0); }
        .ann-text  { font-size:.86rem; color:var(--t1); line-height:1.65; margin-bottom:.65rem; }
        .ann-date  { font-size:.73rem; color:var(--t2); font-weight:600; }

        /* ─── Empty / error ───────────────────────────────────────────────── */
        .empty {
            text-align:center; padding:4rem 2rem;
            border:1px dashed var(--b0); border-radius:var(--r2);
            animation:up .4s ease both;
        }
        .empty-icon { font-size:2.5rem; margin-bottom:.75rem; opacity:.4; }
        .empty p { color:var(--t2); font-size:.9rem; }

        /* ─── Coming Soon popup ───────────────────────────────────────────── */
        #cs-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.65); backdrop-filter:blur(10px);
            z-index:9999; align-items:center; justify-content:center; padding:1.5rem;
        }
        #cs-overlay.show { display:flex; }
        #cs-popup {

<!-- ── Core UI script (progress bar, tab switching, popups, scroll reveal) ─────── -->
<script>
(function () {
    /* ── Progress bar ─────────────────────────────────────────────────────── */
    const bar = document.getElementById('bar');
    let pv = 0, pt;
    function pSet(v) { pv = v; bar.style.width = v + '%'; }
    function pStart() {
        bar.style.opacity = '1'; bar.classList.remove('fin'); pSet(0);
        pt = setInterval(() => { if (pv < 88) pSet(pv + (88 - pv) * .1 + .3); }, 110);
    }
    function pDone() {
        clearInterval(pt); pSet(100);
        setTimeout(() => bar.classList.add('fin'), 260);
        setTimeout(() => { bar.classList.remove('fin'); pSet(0); bar.style.opacity = '1'; }, 680);
    }

    /* ── Page loader ──────────────────────────────────────────────────────── */
    const loader = document.getElementById('page-loader');
    pStart();
    window.addEventListener('load', function () {
        pDone();
        setTimeout(() => loader.classList.add('hidden'), 400);
    });
    // Failsafe — hide after 3s regardless
    setTimeout(() => { pDone(); loader.classList.add('hidden'); }, 3000);

    /* ── Tab switching ────────────────────────────────────────────────────── */
    window.switchTab = function (id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        observeReveal();
    };

    /* ── Coming Soon popup ────────────────────────────────────────────────── */
    window.showComingSoon = function (name) {
        document.getElementById('cs-name').textContent = name;
        document.getElementById('cs-overlay').classList.add('show');
        document.body.style.overflow = 'hidden';
    };
    window.hideCS = function (e) {
        if (e && e.target.id !== 'cs-overlay') return;
        document.getElementById('cs-overlay').classList.remove('show');
        document.body.style.overflow = '';
    };
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('cs-overlay').classList.remove('show');
            document.body.style.overflow = '';
        }
    });

    /* ── Scroll reveal ────────────────────────────────────────────────────── */
    window.observeReveal = function () {
        const els = document.querySelectorAll('.reveal:not(.visible)');
        if (!els.length) return;
        const io = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => entry.target.classList.add('visible'), i * 55);
                    io.unobserve(entry.target);
                }
            });
        }, { threshold: 0.06 });
        els.forEach(el => io.observe(el));
    };
    document.addEventListener('DOMContentLoaded', observeReveal);

    window.goToTests = function() {
        const batchId = new URLSearchParams(window.location.search).get('batchId') || '';
        window.location.href = '/test?batchId=' + encodeURIComponent(batchId);
    };
})();
</script>

<script>
/* ── Community ─────────────────────────────────────────────────────────────── */
(function() {
    const PROXY = 'https://rcxapi.vercel.app/';
    let currentChannel = null;
    let currentPage    = 1;
    let isLoading      = false;
    let communityInited = false;

    // Decode URL-encoded HTML descriptions
    function decodeDesc(raw) {
        if (!raw) return '';
        try { raw = decodeURIComponent(raw); } catch(e) {}
        // strip tags except <br> and <p>
        return raw
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/<p>/gi, '')
            .replace(/<\/p>/gi, '\n')
            .replace(/<[^>]+>/g, '')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
    }

    function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleString('en-IN', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:true});
    }

    function timeAgo(iso) {
        if (!iso) return '';
        const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
        if (diff < 60)   return 'just now';
        if (diff < 3600) return Math.floor(diff/60) + 'm ago';
        if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
        return Math.floor(diff/86400) + 'd ago';
    }

    function rxnEmoji(key) {
        return {heart:'❤️', smile:'😊', laugh:'😂', like:'👍', fire:'🔥'}[key] || key;
    }

    function renderPost(p) {
        const user = p.user || {};
        const name = user.name || 'User';
        const pic  = user.profileImage || '';
        const isTeacher   = (user.roles||[]).includes('teacher');
        const isModerator = (user.roles||[]).includes('moderator');
        const text = decodeDesc(p.description || '');
        const imgs = (p.attachmentUrls||[]).filter(a => a.type === 'images');
        const rxns = p.post_reactions || p.reactions || {};
        const views = (p.views||[]).reduce ? p.views.reduce((a,b)=>a+(typeof b==='number'?b:0),0) : (p.totalUniqueViews||0);

        const tickHtml = isTeacher
            ? `<span class="comm-tick blue" title="Verified Teacher">✓</span>`
            : isModerator
            ? `<span class="comm-tick yellow" title="Moderator">✓</span>`
            : '';

        const avatarHtml = pic
            ? `<img class="comm-avatar" src="${pic}" alt="${name}" onerror="this.outerHTML='<div class=\\'comm-avatar-fallback\\'>${name.charAt(0).toUpperCase()}</div>'">`
            : `<div class="comm-avatar-fallback">${name.charAt(0).toUpperCase()}</div>`;

        const roleHtml = isTeacher
            ? `<span class="comm-role teacher">👨‍🏫 Teacher</span>`
            : isModerator
            ? `<span class="comm-role moderator">🛡️ Moderator</span>`
            : `<span class="comm-role">🎓 Student</span>`;

        let imgsHtml = '';
        if (imgs.length > 0) {
            const cls = imgs.length === 1 ? 'one' : imgs.length === 2 ? 'two' : 'many';
            imgsHtml = `<div class="comm-images ${cls}">` +
                imgs.slice(0,4).map(img =>
                    `<img class="comm-img" src="${img.url}" alt="" loading="lazy" onclick="openLb(this.src)">`
                ).join('') +
            `</div>`;
        }

        const rxnHtml = Object.entries(rxns)
            .filter(([,v]) => v > 0)
            .map(([k,v]) => `<span class="comm-rxn has-val">${rxnEmoji(k)} ${v}</span>`)
            .join('');
        const rxnLine = rxnHtml;

        return `<div class="comm-post">
            <div class="comm-post-head">
                ${avatarHtml}
                <div class="comm-user-info">
                    <div class="comm-username">${name}${tickHtml}</div>
                    ${roleHtml}
                </div>
                <div class="comm-time">${timeAgo(p.createdAt)}</div>
            </div>
            ${text ? `<div class="comm-text">${text.replace(/\n/g,'<br>')}</div>` : ''}
            ${imgsHtml}
            <div class="comm-footer">
                <div class="comm-reactions">${rxnLine}</div>
                ${views > 0 ? `<div class="comm-views">👁 ${views}</div>` : ''}
                ${p.total_comments > 0 ? `<div class="comm-views">💬 ${p.total_comments}</div>` : ''}
            </div>
        </div>`;
    }

    async function fetchPosts(channelId, page) {
        const res = await fetch(PROXY + '?action=get_community_posts', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({channel_id: channelId, page: page})
        });
        return res.json();
    }

    window.selectChannel = function(btn, channelId) {
        if (isLoading) return;
        document.querySelectorAll('.comm-ch-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentChannel = channelId;
        currentPage    = 1;
        document.getElementById('comm-feed').innerHTML = '';
        document.getElementById('comm-load-wrap').style.display = 'none';
        loadPosts(true);
    };

    async function loadPosts(initial = false) {
        if (isLoading || !currentChannel) return;
        isLoading = true;

        const feed    = document.getElementById('comm-feed');
        const skel    = document.getElementById('community-skeleton');
        const loadBtn = document.getElementById('comm-load-btn');

        if (initial) {
            skel.style.display = 'flex';
            skel.style.flexDirection = 'column';
        } else {
            if (loadBtn) { loadBtn.disabled = true; loadBtn.innerHTML = '<span class="comm-spinner"></span> Loading...'; }
        }

        try {
            const data = await fetchPosts(currentChannel, currentPage);
            if (initial) skel.style.display = 'none';

            const postsPayload = data?.data?.data ?? data?.data ?? {};
            if (data.success && postsPayload.posts) {
                const posts = postsPayload.posts;
                const hasNext = postsPayload.hasNextPage;
                const count   = postsPayload.count;

                posts.forEach(p => {
                    feed.insertAdjacentHTML('beforeend', renderPost(p));
                });

                const loadWrap = document.getElementById('comm-load-wrap');
                if (hasNext && count >= 10) {
                    loadWrap.style.display = 'block';
                    if (loadBtn) { loadBtn.disabled = false; loadBtn.innerHTML = 'Load More Posts'; }
                } else {
                    loadWrap.style.display = 'none';
                }
                currentPage++;
            } else {
                if (initial) {
                    feed.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><p>No posts yet</p></div>';
                }
            }
        } catch(e) {
            if (initial) {
                skel.style.display = 'none';
                feed.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Could not load posts</p></div>';
            }
        }
        isLoading = false;
    }

    window.loadMorePosts = function() { loadPosts(false); };

    window.initCommunity = function() {
        if (communityInited) return;
        communityInited = true;
        const firstBtn = document.querySelector('.comm-ch-btn');
        if (firstBtn) {
            currentChannel = firstBtn.dataset.channelId;
            loadPosts(true);
        }
    };

    // Lightbox
    window.openLb = function(src) {
        document.getElementById('img-lb-img').src = src;
        document.getElementById('img-lb').classList.add('show');
        document.body.style.overflow = 'hidden';
    };
    window.closeLb = function(e) {
        if (e && e.target.id !== 'img-lb' && e.target.id !== 'img-lb-close') return;
        document.getElementById('img-lb').classList.remove('show');
        document.body.style.overflow = '';
    };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb({target:{id:'img-lb'}}); });
})();
</script>

<!-- ── Dynamic API Data Loader ────────────────────────────────────────────────── -->
<script>
(function () {
    'use strict';

    /* ── Config ─────────────────────────────────────────────────────────────── */
    const API_BASE    = 'https://rcxapi.vercel.app/';
    const THUMB_FALLBACK = 'https://i.ibb.co/fdgHcWRx/f69ed82b-7169-45fc-a82b-915e453c6340-1.png';
    const SUBJ_FALLBACK  = 'https://static.pw.live/react-batches/assets/svg/subjects/defaultSubject.svg';

    /* ── batchId extraction + guard ─────────────────────────────────────────── */
    const urlParams = new URLSearchParams(window.location.search);
    const batchId   = urlParams.get('batchId');
    if (!batchId) {
        window.location.replace('/PW');
        return; // stop execution immediately
    }

    /* ── Generic POST helper ─────────────────────────────────────────────────── */
    async function apiPost(action, payload) {
        const res = await fetch(API_BASE + '?action=' + encodeURIComponent(action), {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body   : JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    }

    /* ── Utility helpers ─────────────────────────────────────────────────────── */

    // Safely pick the first truthy value from a list of object paths
    function pick(obj) {
        for (let i = 1; i < arguments.length; i++) {
            const keys = arguments[i].split('.');
            let v = obj;
            for (const k of keys) { v = v && v[k]; }
            if (v !== null && v !== undefined && v !== '') return v;
        }
        return null;
    }

    // Format ISO timestamp → "27 May 2026, 03:31 PM"
    function fmtDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleString('en-IN', {
            day:'numeric', month:'short', year:'numeric',
            hour:'2-digit', minute:'2-digit', hour12:true
        });
    }

    // Format time range → "12:00 PM – 01:15 PM"
    function fmtTimeRange(start, end) {
        if (!start) return '';
        const fmt = iso => new Date(iso).toLocaleString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
        return '🕐 ' + fmt(start) + (end ? ' – ' + fmt(end) : '');
    }

    // Format HH:MM:SS duration
    function fmtDuration(dur) {
        if (!dur || dur === '00:00:00') return '';
        return '⏱ ' + dur;
    }

    // Decode raw HTML description (strip excessive nesting, keep content)
    function decodeHtml(raw) {
        if (!raw) return '';
        try { raw = decodeURIComponent(raw); } catch(e) {}
        return raw;
    }

    // Escape HTML entities for safe text insertion
    function esc(s) {
        return String(s || '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Render helper: empty state ─────────────────────────────────────────── */
    function emptyHtml(icon, msg) {
        return `<div class="empty"><div class="empty-icon">${icon}</div><p>${esc(msg)}</p></div>`;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       1. BATCH DETAILS  →  hero, desc cards
    ══════════════════════════════════════════════════════════════════════════ */
    async function loadBatchDetails() {
        try {
            const raw  = await apiPost('get_batch_details', { batch_id: batchId });
            const data = raw.data || raw.batch || raw || {};
            const batch = data.batch || data.details || data;

            // ── Hero title
            const name = pick(batch, 'name', 'title', 'batchName') || 'Batch Dashboard';
            const titleEl = document.getElementById('hero-title-text');
            if (titleEl) titleEl.textContent = name;
            document.title = name;

            // ── Hero chips
            const chips = pick(batch, 'chips', 'tags', 'features', 'highlights') || [];
            const chipsEl = document.getElementById('hero-chips');
            if (chipsEl) {
                if (Array.isArray(chips) && chips.length > 0) {
                    chipsEl.innerHTML = chips
                        .map(c => `<span class="chip">${esc(typeof c === 'string' ? c : (c.label || c.text || c.name || ''))}</span>`)
                        .join('');
                } else {
                    // Build chips from batch meta fields if chips array absent
                    const autoChips = [];
                    const subCount  = pick(batch, 'totalSubjects', 'subjectCount', 'subjects_count');
                    const liveCount = pick(batch, 'totalLectures', 'lectureCount', 'live_count');
                    const annCount  = pick(batch, 'totalAnnouncements', 'announcementCount', 'updates_count');
                    if (subCount)  autoChips.push(`📚 ${subCount} Subjects`);
                    if (liveCount) autoChips.push(`📺 ${liveCount} Classes`);
                    if (annCount)  autoChips.push(`📢 ${annCount} Updates`);
                    chipsEl.innerHTML = autoChips.length
                        ? autoChips.map(c => `<span class="chip">${esc(c)}</span>`).join('')
                        : '';
                }
            }

            // ── Short description card
            const shortDesc = pick(batch, 'shortDescription', 'short_description', 'overview', 'tagline');
            const shortSkel    = document.getElementById('desc-short-skeleton');
            const shortContent = document.getElementById('desc-short-content');
            if (shortSkel && shortContent) {
                if (shortDesc) {
                    shortContent.innerHTML = decodeHtml(shortDesc);
                    shortSkel.style.display    = 'none';
                    shortContent.style.display = 'block';
                } else {
                    // Hide the card gracefully if no short desc
                    const card = document.getElementById('desc-short-card');
                    if (card) card.style.display = 'none';
                }
            }

            // ── Full description card
            const fullDesc = pick(batch, 'description', 'full_description', 'details', 'content');
            const fullSkel    = document.getElementById('desc-full-skeleton');
            const fullContent = document.getElementById('desc-full-content');
            if (fullSkel && fullContent) {
                if (fullDesc) {
                    fullContent.innerHTML = decodeHtml(fullDesc);
                    fullSkel.style.display    = 'none';
                    fullContent.style.display = 'block';
                } else {
                    const card = document.getElementById('desc-full-card');
                    if (card) card.style.display = 'none';
                }
            }

        } catch (err) {
            console.error('[BatchDetails]', err);
            // Graceful fallback — clear skeletons
            ['desc-short-skeleton','desc-full-skeleton'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = emptyHtml('⚠️', 'Could not load batch details.');
            });
        }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       2. TEACHERS  →  .teachers-row
    ══════════════════════════════════════════════════════════════════════════ */
    async function loadTeachers() {
        try {
            const raw      = await apiPost('get_teachers', { batch_id: batchId });
            const teachers = (raw.data || raw.teachers || raw || []);
            const list     = Array.isArray(teachers)
                ? teachers
                : (Array.isArray(teachers.teachers) ? teachers.teachers : []);

            const row = document.getElementById('teachers-row');
            const lbl = document.getElementById('teachers-count-label');
            if (!row) return;

            if (!list.length) {
                row.innerHTML = emptyHtml('👨‍🏫', 'No teachers listed yet.');
                return;
            }

            if (lbl) lbl.textContent = list.length + ' educator' + (list.length !== 1 ? 's' : '');

            row.innerHTML = list.map(t => {
                const name = esc(pick(t, 'name', 'teacherName', 'fullName') || 'Faculty');
                const sub  = esc(pick(t, 'subject', 'subjectName', 'teaches', 'description') || '');
                const img  = pick(t, 'image', 'profileImage', 'photo', 'imageUrl', 'avatar') || '';
                const exp  = pick(t, 'experience', 'exp', 'yearsOfExperience');
                const expBadge = exp ? `<span class="tc-exp">⭐ ${esc(String(exp))}${String(exp).includes('yr') ? '' : '+ yrs'}</span>` : '';
                const imgTag  = img
                    ? `<img src="${esc(img)}" alt="${name}" class="tc-img" onerror="this.style.display='none'">`
                    : '';
                return `<div class="tc">
                    <div class="tc-arch">${imgTag}</div>
                    <div class="tc-body">
                        <div class="tc-name">${name}</div>
                        <div class="tc-sub">${sub}</div>
                        ${expBadge}
                    </div>
                </div>`;
            }).join('');

            observeReveal();

        } catch (err) {
            console.error('[Teachers]', err);
            const row = document.getElementById('teachers-row');
            if (row) row.innerHTML = emptyHtml('⚠️', 'Could not load teachers.');
        }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       3. SUBJECTS  →  .bento
    ══════════════════════════════════════════════════════════════════════════ */
    async function loadSubjects() {
        try {
            const raw  = await apiPost('get_batch_subjects', { batch_id: batchId });
            const subjects = (raw.data || raw.subjects || raw || []);
            const list = Array.isArray(subjects)
                ? subjects
                : (Array.isArray(subjects.subjects) ? subjects.subjects : []);

            const bento = document.getElementById('subjects-bento');
            const badge = document.getElementById('tab-count-subjects');
            if (!bento) return;

            if (badge) badge.textContent = list.length || '';

            if (!list.length) {
                bento.innerHTML = emptyHtml('🎓', 'No subjects available yet.');
                return;
            }

            bento.innerHTML = list.map((s, idx) => {
                const id         = pick(s, '_id', 'id', 'subjectId') || '';
                const name       = pick(s, 'name', 'subjectName', 'title') || 'Subject';
                const slug       = pick(s, 'slug', 'urlSlug') || '';
                const img        = pick(s, 'imageUrl', 'image', 'icon', 'thumbnail', 'coverImage') || SUBJ_FALLBACK;
                const lectCount  = pick(s, 'lectureCount', 'totalLectures', 'lectures', 'count', 'videosCount');
                const comingSoon = !!(s.comingSoon || s.coming_soon || s.isComingSoon || !id);
                const tName      = pick(s, 'teacher.name', 'teacherName', 'faculty') || '';
                const tPic       = pick(s, 'teacher.image', 'teacher.profileImage', 'teacherImage', 'teacherPhoto') || '';

                // Decode rci (base64-encoded image URL from original static markup pattern)
                let rciParam = '';
                if (img && img !== SUBJ_FALLBACK) {
                    try { rciParam = '&rci=' + btoa(img); } catch(e) {}
                }

                const teacherRow = tName
                    ? `<div class="subj-teacher-row">
                            ${tPic ? `<img src="${esc(tPic)}" alt="" class="subj-tpic" onerror="this.style.display='none'">` : ''}
                            <span class="subj-tname">${esc(tName)}</span>
                       </div>`
                    : '';

                const metaBadge = comingSoon
                    ? `<span class="badge badge-soon">⏳ Coming soon</span>`
                    : lectCount
                    ? `<span class="badge badge-count">🎓 ${esc(String(lectCount))} lecture${Number(lectCount) !== 1 ? 's' : ''}</span>`
                    : '';

                const revealDelay = `style="transition-delay:${(idx * 0.045).toFixed(2)}s"`;

                if (comingSoon) {
                    return `<div class="subj-card reveal" ${revealDelay} onclick="showComingSoon(${JSON.stringify(name)})">
                        <div class="subj-img-wrap">
                            <img class="subj-img" src="${esc(img)}" alt="${esc(name)}" onerror="this.src='${SUBJ_FALLBACK}'">
                        </div>
                        <div class="subj-info">
                            <div class="subj-name">${esc(name)}</div>
                            <div class="subj-meta">${metaBadge}</div>
                            ${teacherRow}
                        </div>
                    </div>`;
                }

                const href = `/topics/?batchId=${encodeURIComponent(batchId)}&id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&slug=${encodeURIComponent(slug)}${rciParam}`;

                return `<a href="${esc(href)}" class="subj-card reveal" ${revealDelay}>
                    <div class="subj-img-wrap">
                        <img class="subj-img" src="${esc(img)}" alt="${esc(name)}" onerror="this.src='${SUBJ_FALLBACK}'">
                    </div>
                    <div class="subj-info">
                        <div class="subj-name">${esc(name)}</div>
                        <div class="subj-meta">${metaBadge}</div>
                        ${teacherRow}
                    </div>
                    <div class="subj-arrow">→</div>
                </a>`;
            }).join('');

            observeReveal();

        } catch (err) {
            console.error('[Subjects]', err);
            const bento = document.getElementById('subjects-bento');
            if (bento) bento.innerHTML = emptyHtml('⚠️', 'Could not load subjects.');
        }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       4. LIVE / RECORDINGS  →  .live-grid
    ══════════════════════════════════════════════════════════════════════════ */
    async function loadLiveLectures() {
        try {
            const raw  = await apiPost('get_live_lectures', { batch_id: batchId });
            const lectures = (raw.data || raw.lectures || raw || []);
            const list = Array.isArray(lectures)
                ? lectures
                : (Array.isArray(lectures.lectures) ? lectures.lectures : []);

            const grid  = document.getElementById('live-grid');
            const badge = document.getElementById('tab-count-live');
            if (!grid) return;

            if (badge) badge.textContent = list.length || '';

            if (!list.length) {
                grid.innerHTML = emptyHtml('📺', 'No live or recorded classes for today.');
                return;
            }

            grid.innerHTML = list.map((lec, idx) => {
                const id       = pick(lec, '_id', 'id', 'childId', 'lectureId') || '';
                const title    = pick(lec, 'title', 'topic', 'name', 'lectureTitle') || 'Live Class';
                const subject  = pick(lec, 'subject', 'subjectName', 'subjectTitle', 'subject.name') || '';
                const subjectId= pick(lec, 'subjectId', 'subject._id', 'subject.id') || '';
                const thumb    = pick(lec, 'thumbnailUrl', 'thumbnail', 'image', 'coverImage') || THUMB_FALLBACK;
                const status   = (pick(lec, 'status', 'lectureStatus', 'streamStatus') || 'ended').toLowerCase();
                const startTime= pick(lec, 'startTime', 'scheduledAt', 'dateTime', 'liveAt');
                const endTime  = pick(lec, 'endTime', 'endedAt', 'completedAt');
                const duration = pick(lec, 'duration', 'videoDuration', 'length');
                const tags     = (lec.tags || lec.topics || lec.labels || []).filter(Boolean);
                const videoUrl = pick(lec, 'url', 'videoUrl', 'streamUrl', 'link', 'watchUrl');

                // Determine badge style & label
                let badgeClass = 'badge-ended-s', badgeLabel = '✓ Ended';
                if (status === 'live' || status === 'ongoing') {
                    badgeClass = 'badge-live-s'; badgeLabel = '● LIVE';
                } else if (status === 'upcoming' || status === 'pending' || status === 'scheduled') {
                    badgeClass = 'badge-pending-s'; badgeLabel = '⏰ Upcoming';
                }

                // Build player URL in the original format
                const playerUrl = videoUrl
                    ? videoUrl
                    : `https://rolexcoderz.com/RC/player/?batch_id=${encodeURIComponent(batchId)}&child_id=${encodeURIComponent(id)}&title=${encodeURIComponent(title)}&duration=${encodeURIComponent(duration || '00:00:00')}&subject_id=${encodeURIComponent(subjectId)}`;

                const isClickable  = (status !== 'upcoming' && status !== 'pending' && status !== 'scheduled') || status === 'live';
                const cardClass    = isClickable ? 'lc reveal' : 'lc lc-disabled reveal';
                const btnClass     = (status === 'live' || status === 'ended' || status === 'completed') ? 'lc-btn lc-btn-on' : 'lc-btn lc-btn-off';
                const btnLabel     = status === 'live' ? '🔴 Join Live' : (status === 'ended' || status === 'completed') ? '🎬 Watch Recording' : '⏰ Starting Soon';

                const metaParts = [];
                if (startTime) metaParts.push(fmtTimeRange(startTime, endTime));
                if (duration && duration !== '00:00:00') metaParts.push(fmtDuration(duration));

                const tagsHtml = tags.length
                    ? `<div class="lc-tags">${tags.slice(0,3).map(t => `<span class="lc-tag">${esc(t)}</span>`).join('')}</div>`
                    : '';

                const revealDelay = `style="transition-delay:${(idx * 0.06).toFixed(2)}s"`;

                if (!isClickable) {
                    return `<div class="${cardClass}" ${revealDelay}>
                        <div class="lc-thumb">
                            <img src="${esc(thumb)}" alt="${esc(title)}" onerror="this.src='${THUMB_FALLBACK}'">
                            <div class="lc-thumb-overlay"></div>
                            <span class="lc-badge ${badgeClass}">${badgeLabel}</span>
                        </div>
                        <div class="lc-body">
                            <div class="lc-subject">${esc(subject)}</div>
                            <div class="lc-topic">${esc(title)}</div>
                            <div class="lc-meta">${metaParts.map(m => `<span>${esc(m)}</span>`).join('')}</div>
                            ${tagsHtml}
                            <div class="${btnClass}">${btnLabel}</div>
                        </div>
                    </div>`;
                }

                return `<a href="${esc(playerUrl)}" class="${cardClass}" ${revealDelay} target="_blank" rel="noopener">
                    <div class="lc-thumb">
                        <img src="${esc(thumb)}" alt="${esc(title)}" onerror="this.src='${THUMB_FALLBACK}'">
                        <div class="lc-thumb-overlay"></div>
                        <span class="lc-badge ${badgeClass}">${badgeLabel}</span>
                        <div class="lc-play"><div class="lc-play-icon">▶</div></div>
                    </div>
                    <div class="lc-body">
                        <div class="lc-subject">${esc(subject)}</div>
                        <div class="lc-topic">${esc(title)}</div>
                        <div class="lc-meta">${metaParts.map(m => `<span>${esc(m)}</span>`).join('')}</div>
                        ${tagsHtml}
                        <div class="${btnClass}">${btnLabel}</div>
                    </div>
                </a>`;
            }).join('');

            observeReveal();

        } catch (err) {
            console.error('[LiveLectures]', err);
            const grid = document.getElementById('live-grid');
            if (grid) grid.innerHTML = emptyHtml('⚠️', 'Could not load live classes.');
        }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       5. ANNOUNCEMENTS  →  .ann-list
    ══════════════════════════════════════════════════════════════════════════ */
    async function loadAnnouncements() {
        try {
            const raw  = await apiPost('get_announcements', { batch_id: batchId });
            const anns = (raw.data || raw.announcements || raw || []);
            const list = Array.isArray(anns)
                ? anns
                : (Array.isArray(anns.announcements) ? anns.announcements : []);

            const annList = document.getElementById('ann-list');
            const badge   = document.getElementById('tab-count-ann');
            if (!annList) return;

            if (badge) badge.textContent = list.length || '';

            if (!list.length) {
                annList.innerHTML = emptyHtml('📢', 'No announcements yet.');
                return;
            }

            annList.innerHTML = list.map((a, idx) => {
                const heading = esc(pick(a, 'title', 'heading', 'subject', 'name') || 'Update');
                const text    = esc(pick(a, 'description', 'message', 'body', 'content', 'text') || '');
                const img     = pick(a, 'imageUrl', 'image', 'bannerUrl', 'thumbnail', 'banner') || '';
                const type    = (pick(a, 'type', 'category', 'tag') || 'general').toLowerCase();
                const date    = fmtDate(pick(a, 'createdAt', 'date', 'timestamp', 'publishedAt'));

                // Map type to badge class
                const typeMap = { dpp:'dpp', lecture:'lecture', class:'lecture', offer:'offer', promo:'offer' };
                const badgeKey   = typeMap[type] || 'general';
                const badgeClass = 'ann-badge ann-' + badgeKey;
                const badgeIcon  = badgeKey === 'lecture' ? '🎬 Lecture' : badgeKey === 'dpp' ? '📋 DPP' : badgeKey === 'offer' ? '🎁 Offer' : '📢 Update';

                const imgHtml = img
                    ? `<img src="${esc(img)}" class="ann-img" alt="Announcement" loading="lazy" onerror="this.style.display='none'">`
                    : '';

                const revealDelay = `style="transition-delay:${(idx * 0.05).toFixed(2)}s"`;

                return `<div class="ann-card reveal" ${revealDelay}>
                    ${imgHtml}
                    <div class="ann-body">
                        <div class="ann-top">
                            <span class="${badgeClass}">${badgeIcon}</span>
                            <div class="ann-heading">${heading}</div>
                        </div>
                        ${text ? `<div class="ann-text">${text}</div>` : ''}
                        ${date ? `<div class="ann-date">📅 ${esc(date)}</div>` : ''}
                    </div>
                </div>`;
            }).join('');

            observeReveal();

        } catch (err) {
            console.error('[Announcements]', err);
            const annList = document.getElementById('ann-list');
            if (annList) annList.innerHTML = emptyHtml('⚠️', 'Could not load announcements.');
        }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       INIT — fire all fetches in parallel on DOMContentLoaded
    ══════════════════════════════════════════════════════════════════════════ */
    function init() {
        // Run all API calls concurrently — independent, non-blocking
        loadBatchDetails();
        loadTeachers();
        loadSubjects();
        loadLiveLectures();
        loadAnnouncements();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();
</script>

</body>
</html>
